name: Build Mod

on: [push, pull_request]

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Mod File
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://github.com" -OutFile "geode.zip"
        Expand-Archive -Path "geode.zip" -DestinationPath "." -Force
        $env:PATH += ";$PWD"
        geode sdk install
        geode profile auto
        geode package build .
